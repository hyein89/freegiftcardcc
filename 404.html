
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #00e5ff; /* Samain sama BG utama lo */
            overflow: hidden;
        }
        .error-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            padding: 0 10px; /* Jarak se-rambut di HP */
            box-sizing: border-box;
        }
        .error-box {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }
        /* SVG area */
        .svg-container {
            width: 100%;
            max-width: 220px;
            margin: 0 auto 25px auto;
        }
        /* Animasi Pulsing pada SVG */
        @keyframes svgPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-svg {
            animation: svgPulse 3s infinite ease-in-out;
        }
        .error-code {
            font-size: 60px;
            font-weight: 800;
            color: #1a237e;
            margin: 0 0 10px 0;
            line-height: 1;
            letter-spacing: -2px;
        }
        .error-title {
            font-size: 18px;
            font-weight: 700;
            color: #333333;
            margin: 0 0 15px 0;
            text-transform: uppercase;
        }
        .error-text {
            font-size: 14px;
            color: #666666;
            line-height: 1.6;
            margin: 0 0 30px 0;
            font-weight: 500;
        }
        .home-btn {
            display: inline-block;
            background-color: #1a237e;
            color: #ffffff !important;
            text-decoration: none !important;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26, 35, 126, 0.3);
        }
        /* Animasi Pulsing pada Tombol */
        @keyframes btnPulse {
            0% { box-shadow: 0 4px 15px rgba(26, 35, 126, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(26, 35, 126, 0.6); }
            100% { box-shadow: 0 4px 15px rgba(26, 35, 126, 0.3); }
        }
        .home-btn:hover {
            background-color: #0d125c;
            transform: translateY(-2px);
            animation: btnPulse 1.5s infinite; /* Aktif pas hover */
        }
        @media (max-width: 480px) {
            .error-box { padding: 30px 15px; }
            .error-code { font-size: 50px; }
            .error-title { font-size: 16px; }
            .error-text { font-size: 13px; }
            .svg-container { max-width: 180px; }
        }
    </style>
</head>
<body>

    <div class="error-wrapper">
        <div class="error-box">
            
            <div class="svg-container animate-svg">
                <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <path d="M421.4 336c18.8 0 34.1-15.3 34.1-34.1V130.1C455.5 58.2 397.3 0 325.4 0H186.6C114.7 0 56.5 58.2 56.5 130.1v171.8c0 18.8 15.3 34.1 34.1 34.1h330.8z" fill="#eeeeee"/>
                    <path d="M116.3 336h279.4v34.1c0 18.8-15.3 34.1-34.1 34.1H150.4c-18.8 0-34.1-15.3-34.1-34.1V336z" fill="#e0e0e0"/>
                    <path d="M150.4 404.3h211.2V471c0 22.6-18.3 41-41 41H191.4c-22.6 0-41-18.3-41-41v-66.7z" fill="#eeeeee"/>
                    <path d="M256 128c-35.3 0-64 28.7-64 64s28.7 64 64 64 64-28.7 64-64-28.7-64-64-64zm0 96c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z" fill="#1a237e"/>
                    <circle cx="168" cy="192" fill="#1a237e" r="16"/>
                    <circle cx="344" cy="192" fill="#1a237e" r="16"/>
                    <path d="M186.6 302.1h138.8c10.3 0 18.7-8.4 18.7-18.7S335.7 264.7 325.4 264.7H186.6c-10.3 0-18.7 8.4-18.7 18.7s8.4 18.7 18.7 18.7z" fill="#ffca28"/>
                    <path d="M256 34.1c-10.3 0-18.7-8.4-18.7-18.7S245.7-3.3 256-3.3s18.7 8.4 18.7 18.7S266.3 34.1 256 34.1z" fill="#00e5ff"/>
                </svg>
            </div>

            <div class="error-code">404</div>
            <h1 class="error-title">Oops! Page Lost in Space</h1>
            <p class="error-text">
                The content you are looking for has been moved, deleted, or perhaps never existed in this digital dimension. Don't worry, it happens to the best of us!
            </p>
            
            <a href="/" class="home-btn">&larr; Back to Reality</a>
            
        </div>
    </div>

</body>
</html>
